<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120" role="img" aria-label="be-a-boss">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd15c"/>
      <stop offset="1" stop-color="#ff9d3c"/>
    </linearGradient>
  </defs>
  <!-- self-contained dark badge so it reads on light or dark pages -->
  <rect x="1" y="1" width="518" height="118" rx="22" fill="#0e1117" stroke="#232a36"/>

  <!-- org mark: one boss node driving three workers -->
  <g transform="translate(40 60)">
    <line x1="0" y1="0" x2="34" y2="-26" stroke="url(#acc)" stroke-width="3.5"/>
    <line x1="0" y1="0" x2="40" y2="0"   stroke="url(#acc)" stroke-width="3.5"/>
    <line x1="0" y1="0" x2="34" y2="26"  stroke="url(#acc)" stroke-width="3.5"/>
    <circle cx="0"  cy="0"   r="15" fill="url(#acc)"/>
    <circle cx="0"  cy="0"   r="6"  fill="#0e1117"/>
    <circle cx="38" cy="-26" r="7.5" fill="#e6eaf2"/>
    <circle cx="44" cy="0"   r="7.5" fill="#e6eaf2"/>
    <circle cx="38" cy="26"  r="7.5" fill="#e6eaf2"/>
  </g>

  <!-- wordmark -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700">
    <text x="132" y="56" font-size="34" letter-spacing="1" fill="#e6eaf2">be-a-<tspan fill="url(#acc)">boss</tspan></text>
    <text x="133" y="82" font-size="13" letter-spacing="3.5" fill="#9aa6b8" font-weight="500">YOU'RE THE BOSS · THEY DO THE WORK</text>
  </g>
</svg>
