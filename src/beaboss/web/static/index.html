<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>be-a-boss — cockpit</title>
  <style>
    /* ---- Command Deck: a calm-but-alive control surface for an AI org ------- */
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: #10131b;
      --raised: #161a24;
      --border: #232a38;
      --border-soft: #1a202c;
      --text: #e7eaf2;
      --dim: #8b93a7;
      --faint: #5f677b;
      --orchestrator: #7c9bff;
      --worker: #c58cf2;
      --you: #4fce93;
      --system: #8b93a7;
      --amber: #ffb454;
      --approve: #4fce93;
      --reject: #f2708b;
      --accent: #7c9bff;
      --accent-ink: #0b0d12;
      --radius: 11px;
      --mono: ui-monospace, "Cascadia Code", "SF Mono", "Consolas", monospace;
      --sans: -apple-system, "Segoe UI", system-ui, "Helvetica Neue", sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --bg: #f6f7fb; --panel: #eef1f7; --raised: #ffffff;
        --border: #dbe0ec; --border-soft: #e6eaf2;
        --text: #171b24; --dim: #5c6478; --faint: #8b93a7;
        --orchestrator: #3a5bd9; --worker: #8b3fd0; --you: #1f9c62;
        --amber: #c77b12; --approve: #1f9c62; --reject: #d33a5e; --accent: #3a5bd9;
        --accent-ink: #ffffff;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; display: grid; grid-template-columns: 272px 1fr;
      background: var(--bg); color: var(--text);
      font: 15px/1.5 var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ---- sidebar ----------------------------------------------------------- */
    aside {
      background: var(--panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; min-height: 0;
    }
    #brand {
      display: flex; align-items: center; gap: 9px;
      padding: 14px 16px 12px; border-bottom: 1px solid var(--border-soft);
    }
    #brand .mark {
      width: 22px; height: 22px; border-radius: 6px; flex: none;
      background: linear-gradient(135deg, var(--orchestrator), var(--worker));
      display: grid; place-items: center; color: #fff; font-size: 12px; font-weight: 800;
    }
    #brand .org { font-weight: 650; letter-spacing: .2px; }
    #conn {
      margin-left: auto; width: 8px; height: 8px; border-radius: 50%;
      background: var(--faint);
    }
    #conn.on { background: var(--you); box-shadow: 0 0 10px -1px var(--you); }
    #conn.retry { background: var(--amber); }
    #conn.off { background: var(--reject); }
    .section-label {
      font-size: 11px; letter-spacing: 1.4px; color: var(--faint);
      padding: 14px 16px 7px; font-weight: 700;
    }
    #threads { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
    .thread {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; margin: 2px 0; border-radius: 9px; cursor: pointer;
      position: relative; color: var(--text); border: 1px solid transparent;
      transition: background .12s ease;
    }
    .thread:hover { background: var(--raised); }
    .thread.active { background: var(--raised); border-color: var(--border); }
    .thread.active::before {
      content: ""; position: absolute; left: -8px; top: 8px; bottom: 8px;
      width: 3px; border-radius: 3px; background: var(--accent);
    }
    .thread .emoji { flex: none; width: 18px; text-align: center; }
    .thread .name {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-size: 14px;
    }
    .thread.closed { opacity: .5; }
    .thread .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--amber);
      flex: none; animation: pulse 1.4s ease-in-out infinite;
    }
    .thread .badge {
      flex: none; min-width: 18px; height: 18px; padding: 0 6px; border-radius: 9px;
      background: var(--accent); color: var(--accent-ink);
      font-size: 11px; font-weight: 700; display: grid; place-items: center;
    }
    #status {
      padding: 9px 16px; font-size: 12px; color: var(--dim);
      border-top: 1px solid var(--border-soft);
    }

    /* ---- main -------------------------------------------------------------- */
    main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    #topbar {
      display: flex; align-items: baseline; gap: 10px;
      padding: 13px 20px; border-bottom: 1px solid var(--border-soft);
    }
    #active-title { font-weight: 650; font-size: 16px; }
    #active-sub { font-size: 12.5px; color: var(--dim); }
    #active-chip {
      margin-left: auto; font-size: 12px; color: var(--amber);
      display: none; align-items: center; gap: 7px;
    }
    #active-chip.show { display: flex; }
    #active-chip .dot { width: 6px; height: 6px; border-radius: 50%;
      background: var(--amber); animation: pulse 1.4s ease-in-out infinite; }

    #dash-wrap { border-bottom: 1px solid var(--border-soft); background: var(--panel); }
    #dash-wrap[hidden] { display: none; }
    .dash-head {
      font-size: 11px; letter-spacing: 1.4px; color: var(--faint); font-weight: 700;
      padding: 9px 20px 2px;
    }
    #dash {
      margin: 0; padding: 2px 20px 12px; font: 12.5px/1.6 var(--mono);
      color: var(--dim); white-space: pre-wrap; word-break: break-word;
      max-height: 168px; overflow-y: auto;
    }

    #log { flex: 1; overflow-y: auto; padding: 20px; min-height: 0; }
    .msg { margin: 0 auto 18px; max-width: 760px; }
    .msg .head {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px;
    }
    .msg .who { font-weight: 650; font-size: 13.5px; }
    .msg .time { font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; }
    .role-orchestrator .who { color: var(--orchestrator); }
    .role-worker .who { color: var(--worker); }
    .role-you .who { color: var(--you); }
    .role-system .who, .role-direct .who { color: var(--system); }
    .msg .body { color: var(--text); }
    .role-system .body { color: var(--dim); }

    /* markdown */
    .body > *:first-child { margin-top: 0; }
    .body > *:last-child { margin-bottom: 0; }
    .body p { margin: 0 0 9px; }
    .body h1, .body h2, .body h3 { margin: 12px 0 7px; line-height: 1.3; font-weight: 680; }
    .body h1 { font-size: 19px; } .body h2 { font-size: 17px; } .body h3 { font-size: 15px; }
    .body ul, .body ol { margin: 0 0 9px; padding-left: 22px; }
    .body li { margin: 2px 0; }
    .body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
    .body a:hover { border-bottom-color: currentColor; }
    .body code {
      font: 12.5px var(--mono); background: var(--raised);
      border: 1px solid var(--border-soft); border-radius: 5px; padding: 1px 5px;
    }
    .body pre {
      margin: 0 0 9px; padding: 12px 14px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 9px; overflow-x: auto;
    }
    .body pre code { background: none; border: 0; padding: 0; font-size: 12.5px; line-height: 1.55; }
    .body blockquote {
      margin: 0 0 9px; padding: 2px 0 2px 13px; color: var(--dim);
      border-left: 3px solid var(--border);
    }
    .msg img.media {
      max-width: 100%; border-radius: 10px; margin-top: 8px;
      border: 1px solid var(--border);
    }
    .msg a.file {
      display: inline-block; margin-top: 8px; padding: 7px 12px; border-radius: 8px;
      background: var(--raised); border: 1px solid var(--border);
      color: var(--text); text-decoration: none; font-size: 13.5px;
    }

    /* approval action bar (conservative mode's 🚦 prompt) */
    .actions { display: flex; gap: 9px; margin-top: 10px; }
    .actions button {
      padding: 7px 15px; border-radius: 8px; border: 1px solid var(--border);
      font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
      background: var(--raised); color: var(--text);
    }
    .actions .approve { background: var(--approve); color: var(--accent-ink); border-color: transparent; }
    .actions .reject:hover { border-color: var(--reject); color: var(--reject); }
    .actions button:hover { filter: brightness(1.06); }

    /* working typing bubble */
    .typing { display: flex; gap: 5px; padding: 4px 0; max-width: 760px; margin: 0 auto 18px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--worker);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: .16s; }
    .typing span:nth-child(3) { animation-delay: .32s; }

    /* composer */
    form {
      display: flex; gap: 10px; padding: 14px 20px 6px;
      border-top: 1px solid var(--border-soft);
    }
    #box {
      flex: 1; padding: 11px 14px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--raised); color: inherit;
      font: inherit; outline: none; transition: border-color .12s ease;
    }
    #box:focus { border-color: var(--accent); }
    #box::placeholder { color: var(--faint); }
    #attach {
      flex: none; width: 44px; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--raised); color: var(--dim); font-size: 17px; cursor: pointer;
    }
    #attach:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
    button#submit {
      padding: 11px 20px; border: 0; border-radius: var(--radius); cursor: pointer;
      background: var(--accent); color: var(--accent-ink); font: inherit; font-weight: 650;
    }
    button:disabled { opacity: .45; cursor: default; }

    #tray { display: none; flex-wrap: wrap; gap: 8px; padding: 12px 20px 0; }
    #tray.show { display: flex; }
    .chip {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px 6px 10px;
      background: var(--raised); border: 1px solid var(--border); border-radius: 9px;
      font-size: 12.5px; max-width: 240px;
    }
    .chip img { width: 26px; height: 26px; object-fit: cover; border-radius: 5px; flex: none; }
    .chip .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip .x { cursor: pointer; color: var(--faint); font-weight: 700; padding: 0 2px; }
    .chip .x:hover { color: var(--reject); }
    #hint {
      padding: 6px 20px 14px; font-size: 11.5px; color: var(--faint);
    }
    #hint code { font: 11.5px var(--mono); color: var(--dim); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: .5; }
                        40% { transform: translateY(-5px); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .thread .dot, #active-chip .dot, .typing span { animation: none; }
    }
  </style>
</head>
<body>
  <aside>
    <header id="brand">
      <span class="mark">◆</span>
      <span class="org">be-a-boss</span>
      <span id="conn" title="connecting…"></span>
    </header>
    <div class="section-label">THREADS</div>
    <div id="threads"></div>
    <footer id="status">connecting…</footer>
  </aside>
  <main>
    <header id="topbar">
      <span id="active-title">Orchestrator</span>
      <span id="active-sub"></span>
      <span id="active-chip"><span class="dot"></span><span id="active-chip-text">working…</span></span>
    </header>
    <section id="dash-wrap" hidden>
      <div class="dash-head">FLEET</div>
      <pre id="dash"></pre>
    </section>
    <div id="log"></div>
    <div id="tray"></div>
    <form id="send">
      <button type="button" id="attach" title="Attach files" disabled>📎</button>
      <input id="box" placeholder="Message the orchestrator…" autocomplete="off" disabled>
      <button id="submit" disabled>Send</button>
    </form>
    <input type="file" id="file" multiple hidden>
    <div id="hint">Enter to send &nbsp;·&nbsp; <code>/new &lt;path&gt;</code> &nbsp;·&nbsp;
      <code>/approve &lt;id&gt;</code> &nbsp;·&nbsp; <code>/stop</code> &nbsp;·&nbsp;
      <code>/kill</code> &nbsp;·&nbsp; <code>/help</code></div>
  </main>
  <script src="client.js"></script>
  <script>
    // The server gates the socket on a token (printed at startup) + Origin. Read the
    // token from our own URL: open http://<host>/?token=… (the server logs it).
    const q = new URLSearchParams(location.search);
    const token = q.get("token") || "";
    // Served over http(s) → use this origin's host; opened as a bare file:// →
    // fall back to host/port params (default 127.0.0.1:8765).
    const hostport = location.host ||
      ((q.get("host") || "127.0.0.1") + ":" + (q.get("port") || "8765"));
    const wsUrl = (location.protocol === "https:" ? "wss://" : "ws://") + hostport +
      (token ? "?token=" + encodeURIComponent(token) : "");
    beaboss.connect(wsUrl);
  </script>
</body>
</html>
