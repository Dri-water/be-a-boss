name: docker

# Validates the image builds on every push to main (catches Dockerfile
# regressions), and publishes to GHCR on version tags (v*). Publishing uses the
# built-in GITHUB_TOKEN — no user-provided secret required.
on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ghcr.io/dri-water/be-a-boss:latest
            ghcr.io/dri-water/be-a-boss:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
